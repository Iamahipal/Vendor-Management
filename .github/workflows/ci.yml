name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: API test suite
        run: npm test

      - name: Production build
        run: npm run build

      - name: Static demo build
        run: npx vite build --base=/Vendor-Management/
        env:
          VITE_DEMO_MODE: 'true'
